<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Henoc AI Chat</title>
<style>
body { font-family: Arial; background: #ece5dd; margin: 0; padding: 0; }
header { background: #075e54; color: white; padding: 15px; text-align: center; font-size: 1.5em; }
#chat-container { display: flex; flex-direction: column; height: calc(100vh - 70px); max-width: 600px; margin: 0 auto; padding: 10px; overflow-y: auto; }
.message { max-width: 70%; margin: 5px 0; padding: 10px; border-radius: 20px; word-wrap: break-word; }
.user { background-color: #dcf8c6; align-self: flex-end; }
.bot { background-color: #ffffff; align-self: flex-start; }
#input-container { display: flex; max-width: 600px; margin: 0 auto; padding: 10px; background: #fff; }
#input-container input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
#input-container button { margin-left: 10px; padding: 10px 20px; border-radius: 20px; border: none; background: #25d366; color: white; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>
<header>Henoc AI Chat</header>
<div id="chat-container"></div>
<div id="input-container">
<input type="text" id="user-input" placeholder="Écris ton message ici...">
<button onclick="sendMessage()">Envoyer</button>
</div>
<script>
const chatContainer = document.getElementById('chat-container');
const userInput = document.getElementById('user-input');
let chatHistory = [];

// Ajouter un message dans le chat
function addMessage(text, sender) {
    const msg = document.createElement('div');
    msg.className = 'message ' + sender;
    msg.textContent = text;
    chatContainer.appendChild(msg);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    chatHistory.push({ role: sender, content: text });
}

// Appeler Hugging Face API pour générer une réponse
async function botReply(userMessage) {
    try {
        const response = await fetch("https://api-inference.huggingface.co/models/henoc-ai/henoc-chat", {
            method: "POST",
            headers: {
                "Authorization": "Bearer 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",
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ inputs: userMessage })
        });
        const data = await response.json();
        const reply = data?.[0]?.generated_text || "Henoc AI est hors ligne 😔";
        addMessage(reply, "bot");
    } catch (err) {
        addMessage("Henoc AI est hors ligne 😔", "bot");
        console.error(err);
    }
}

// Envoyer message
function sendMessage() {
    const message = userInput.value.trim();
    if(!message) return;
    addMessage(message, 'user');
    userInput.value = '';
    botReply(message);
}

// Touche Enter
userInput.addEventListener('keydown', e => { if(e.key === 'Enter') sendMessage(); });

// Historique local
window.onload = () => {
    if(localStorage.getItem('chatHistory')) {
        chatHistory = JSON.parse(localStorage.getItem('chatHistory'));
        chatHistory.forEach(msg => addMessage(msg.content, msg.role));
    }
};
window.onbeforeunload = () => {
    localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
};
</script>
</body>
</html>
