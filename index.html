<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Henoc Virtuel Chat</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>

body{
font-family:Arial;
background:#ece5dd;
margin:0;
}

header{
background:#075e54;
color:white;
padding:15px;
text-align:center;
font-size:1.5em;
}

#title{
text-align:center;
font-size:1.8em;
margin:10px;
color:#075e54;
font-weight:bold;
}

#sections{
max-width:600px;
margin:auto;
}

.section{
background:white;
margin:10px;
padding:10px;
border-radius:10px;
}

.scroll-box{
max-height:120px;
overflow-y:auto;
}

.scroll-box div{
padding:8px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.scroll-box div:hover{
background:#f0f0f0;
}

#chat-container{
display:flex;
flex-direction:column;
max-width:600px;
margin:auto;
padding:10px;
height:300px;
overflow-y:auto;
background:#f0f0f0;
border-radius:10px;
}

.message{
margin:5px 0;
padding:8px;
border-radius:15px;
max-width:70%;
}

.user{
align-self:flex-end;
background:#dcf8c6;
}

.other{
align-self:flex-start;
background:white;
}

#input-container{
display:flex;
max-width:600px;
margin:auto;
padding:10px;
background:white;
}

#input-container input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
margin-right:5px;
}

#input-container button{
padding:10px 20px;
border:none;
background:#25d366;
color:white;
border-radius:20px;
}

</style>

</head>

<body>

<header>Henoc Virtuel Chat</header>

<div id="title">Henoc Virtuel</div>

<div id="sections">

<div class="section">
<h3>Conversations</h3>
<div class="scroll-box" id="conversations"></div>
</div>

<div class="section">
<h3>Statuts</h3>
<div class="scroll-box" id="status"></div>
</div>

<div class="section">
<h3>Répertoire</h3>
<div class="scroll-box" id="directory"></div>
</div>

<div class="section">
<h3>Abonnés</h3>
<div class="scroll-box" id="subscribers"></div>
</div>

</div>

<div id="chat-container"></div>

<div id="input-container">
<input id="pseudo" placeholder="Ton nom">
<input id="user-input" placeholder="Message">
<button onclick="sendMessage()">Envoyer</button>
</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyAae27A5HSJ80eXk_Zw-khnoDlVUgbZ-MA",
authDomain:"henochat-109b5.firebaseapp.com",
databaseURL:"https://henochat-109b5-default-rtdb.firebaseio.com",
projectId:"henochat-109b5"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let currentUser=null;
let currentChat="public";

const chatContainer=document.getElementById("chat-container");
const pseudoInput=document.getElementById("pseudo");
const userInput=document.getElementById("user-input");

const subscribersBox=document.getElementById("subscribers");
const directoryBox=document.getElementById("directory");
const conversationsBox=document.getElementById("conversations");


pseudoInput.addEventListener("change",()=>{

const name=pseudoInput.value.trim();

if(!name){
alert("Entre ton nom");
return;
}

currentUser=name;

db.ref("users/"+name).set({
name:name,
joined:Date.now()
});

});


function openPrivateChat(user){

if(!currentUser)return;

currentChat=[currentUser,user].sort().join("_");

chatContainer.innerHTML="";

loadMessages();

addConversation(user);

}


function addConversation(user){

const div=document.createElement("div");
div.textContent=user;

div.onclick=()=>{
openPrivateChat(user);
};

conversationsBox.appendChild(div);

}


function sendMessage(){

if(!currentUser){
alert("Entre ton nom");
return;
}

const message=userInput.value.trim();

if(!message)return;

const now=new Date();

const timestamp=
now.getHours().toString().padStart(2,"0")+":"+
now.getMinutes().toString().padStart(2,"0");

db.ref("messages/"+currentChat).push({

pseudo:currentUser,
text:message,
timestamp:timestamp

});

userInput.value="";

}


function addMessage(text,pseudo,timestamp){

const msg=document.createElement("div");

msg.className=pseudo===currentUser?"message user":"message other";

msg.innerHTML="<b>"+pseudo+"</b><br>"+text+" <span style='font-size:10px;color:gray'>"+timestamp+"</span>";

chatContainer.appendChild(msg);

chatContainer.scrollTop=chatContainer.scrollHeight;

}


function loadMessages(){

db.ref("messages/"+currentChat).off();

db.ref("messages/"+currentChat).on("child_added",snap=>{

const data=snap.val();

addMessage(data.text,data.pseudo,data.timestamp);

});

}


db.ref("users").on("child_added",snap=>{

const user=snap.val();

const div=document.createElement("div");

div.textContent=user.name;

div.onclick=()=>{

openPrivateChat(user.name);

};

subscribersBox.appendChild(div);

directoryBox.appendChild(div.cloneNode(true));

});


userInput.addEventListener("keydown",e=>{
if(e.key==="Enter"){
sendMessage();
}
});

</script>

</body>
    </html>
