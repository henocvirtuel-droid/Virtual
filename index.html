<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Chat</title>

<!-- Firebase JS -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; background: #ece5dd; margin:0; padding:0; }
header { background: #075e54; color:white; text-align:center; padding:15px; font-size:1.5em; box-shadow:0 2px 5px rgba(0,0,0,0.2);}
#title { text-align:center; font-size:1.8em; margin:10px 0; color:#075e54; font-weight:bold; }
#container { max-width:600px; margin:0 auto; }
#chat-list{height:15vh; overflow-y:auto; border-bottom:1px solid #ccc;}
.chat-item{display:flex;align-items:center;padding:8px;cursor:pointer;border-bottom:1px solid #eee;}
.chat-item:hover{background:#f1f0f0;}
.avatar{width:40px;height:40px;border-radius:50%;margin-right:10px;}
.chat-name{font-weight:bold;}
.status-text{font-size:0.8em;color:gray;}
#chat-container { height:35vh; overflow-y:auto; padding:10px; display:flex; flex-direction:column; background:#f0f0f0; border-radius:10px; }
.message{padding:10px;margin:5px 0;border-radius:20px;max-width:70%;line-height:1.4;display:flex;flex-direction:column;}
.message.user{align-self:flex-end;background:#dcf8c6;border-bottom-right-radius:0;}
.message.other{align-self:flex-start;background:#ffffff;border-bottom-left-radius:0;}
.ticks{font-size:0.7em;color:gray;align-self:flex-end;}
#input-container{display:flex;margin:5px 0;}
#input-container input{flex:1;padding:10px;border-radius:20px;border:1px solid #ccc;margin-right:5px;}
#input-container button{padding:10px 20px;border-radius:20px;border:none;background:#25d366;color:white;cursor:pointer;}
#input-container button:hover{background:#128c7e;}
#posts{margin-top:10px;}
.post{background:white;padding:10px;border-radius:10px;margin-bottom:10px;}
.post .actions{margin-top:5px;display:flex;gap:10px;}
</style>
</head>
<body>

<header>Virtual</header>
<div id="title">Virtual</div>

<div id="container">
  <!-- Liste contacts / utilisateurs -->
  <div id="chat-list"></div>

  <!-- Chat privé -->
  <div id="chat-container"></div>
  <div id="input-container">
    <input type="text" id="pseudo" placeholder="Ton pseudo" style="flex:1;">
    <input type="text" id="user-input" placeholder="Écris ton message..." style="flex:2;">
    <button onclick="sendMessage()">Envoyer</button>
  </div>

  <!-- Posts -->
  <div id="posts"></div>
</div>

<script>
// 🔹 Firebase Config 🔹
const firebaseConfig = {
  apiKey: "AIzaSyAae27A5HSJ80eXk_Zw-khnoDlVUgbZ-MA",
  authDomain: "henochat-109b5.firebaseapp.com",
  databaseURL: "https://henochat-109b5-default-rtdb.firebaseio.com",
  projectId: "henochat-109b5",
  storageBucket: "henochat-109b5.appspot.com",
  messagingSenderId: "681244730245",
  appId: "1:681244730245:web:feb5fe5b02e8f1958f5aec"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔹 Variables 🔹
let currentUserId = "user123"; // change à chaque utilisateur pour test multi-utilisateurs
let currentChatId = "";
const chatList = document.getElementById('chat-list');
const chatContainer = document.getElementById('chat-container');
const userInput = document.getElementById('user-input');
const pseudoInput = document.getElementById('pseudo');
const postsDiv = document.getElementById('posts');

// 🔹 Présence en ligne 🔹
const statusRef = db.ref(`users/${currentUserId}/status`);
window.addEventListener("focus", ()=> statusRef.set("online"));
window.addEventListener("blur", ()=> statusRef.set("offline"));

// 🔹 Liste utilisateurs 🔹
db.ref("users").once("value", snap=>{
  const users = snap.val();
  for(let uid in users){
    if(uid!==currentUserId){
      const div = document.createElement('div');
      div.className="chat-item";
      div.onclick = ()=> openChat(uid);
      div.innerHTML = `<img src="${users[uid].avatar||'https://i.pravatar.cc/40'}" class="avatar">
                       <div>
                         <div class="chat-name">${users[uid].pseudo}</div>
                         <div class="status-text" id="status-${uid}"></div>
                       </div>`;
      chatList.appendChild(div);
      db.ref(`users/${uid}/status`).on("value", s=>{
        document.getElementById(`status-${uid}`).textContent = s.val()==="online"?"En ligne":"Hors ligne";
      });
    }
  }
});

// 🔹 Ouvrir chat privé 🔹
function openChat(otherId){
  chatContainer.innerHTML="";
  currentChatId = [pseudoInput.value.trim(),otherId].sort().join("_");
  const chatRef = db.ref(`privateChats/${currentChatId}/messages`);
  chatRef.off();
  chatRef.on("child_added", snap=>{
    const msg = snap.val();
    addMessageUI(snap.key,msg.senderId,msg.text,msg.readBy);
  });
}

// 🔹 Afficher message 🔹
function addMessageUI(msgId,sender,text,readBy){
  const div = document.createElement('div');
  div.className = sender===pseudoInput.value.trim()?"message user":"message other";
  const tickText = sender===pseudoInput.value.trim() ? `${readBy && readBy.includes(pseudoInput.value.trim()) ? "✅ lu":"✅"}`:"";
  div.innerHTML=`<span>${text}</span><span class="ticks">${tickText}</span>`;
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
  if(sender!==pseudoInput.value.trim()) markMessageAsRead(msgId);
}

// 🔹 Envoyer message 🔹
function sendMessage(){
  const text = userInput.value.trim();
  const sender = pseudoInput.value.trim() || "Anonyme";
  if(!text || !currentChatId) return;
  const msgId = "msg"+Date.now();
  const now = new Date().toISOString();
  db.ref(`privateChats/${currentChatId}/messages/${msgId}`).set({
    senderId: sender,
    text,
    timestamp: now,
    readBy:[sender]
  });
  userInput.value='';
}

// 🔹 Confirmation lecture 🔹
function markMessageAsRead(msgId){
  const reader = pseudoInput.value.trim();
  const ref = db.ref(`privateChats/${currentChatId}/messages/${msgId}/readBy`);
  ref.once("value", snap=>{
    let readers = snap.val()||[];
    if(!readers.includes(reader)){
      readers.push(reader);
      ref.set(readers);
    }
  });
}

// 🔹 POSTS 🔹
db.ref("posts").on("child_added", snap=>{
  const post = snap.val();
  const div = document.createElement('div');
  div.className="post";
  const isPublic = post.public||false;
  div.innerHTML=`<div><b>${post.owner}</b></div>
                 <div>${post.text}</div>
                 <div class="actions">
                   <button onclick="likePost('${snap.key}')">❤️ ${post.likes?post.likes.length:0}</button>
                   <button onclick="commentPostPrompt('${snap.key}')">💬 ${post.comments?Object.keys(post.comments).length:0}</button>
                 </div>`;
  if(!isPublic && post.owner!==pseudoInput.value.trim()) div.style.display="none";
  postsDiv.appendChild(div);
});

// 🔹 Likes / Commentaires 🔹
function likePost(postId){
  const ref = db.ref(`posts/${postId}/likes`);
  ref.once("value", snap=>{
    let likes = snap.val()||[];
    if(!likes.includes(pseudoInput.value.trim())) likes.push(pseudoInput.value.trim());
    ref.set(likes);
  });
}

function commentPostPrompt(postId){
  const text = prompt("Écris ton commentaire :");
  if(!text) return;
  const commentId = "cmt"+Date.now();
  db.ref(`posts/${postId}/comments/${commentId}`).set({
    userId: pseudoInput.value.trim(),
    text,
    timestamp: new Date().toISOString()
  });
}
</script>
</body>
</html>
