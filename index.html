<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VIRCHAT</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#0f6d5f;
color:white;
text-align:center;
padding:15px;
font-size:22px;
font-weight:bold;
}

.menu{
display:flex;
background:white;
border-bottom:1px solid #ccc;
}

.menu button{
flex:1;
padding:15px;
border:none;
background:white;
font-weight:bold;
cursor:pointer;
}

.section{
display:none;
padding:15px;
}

.active{
display:block;
}

.chat{
background:white;
padding:10px;
margin:5px;
border-radius:10px;
}

.messageBox{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:white;
border-top:1px solid #ccc;
}

.messageBox input{
flex:1;
padding:12px;
border:none;
}

.messageBox button{
background:#0f6d5f;
color:white;
border:none;
padding:12px;
cursor:pointer;
}

</style>

</head>

<body>

<header>
VIRCHAT
</header>

<div class="menu">

<button onclick="openSection('conversations')">Conversations</button>

<button onclick="openSection('status')">Status</button>

<button onclick="openSection('repertoire')">Répertoire</button>

<button onclick="openSection('abonnes')">Abonnés</button>

</div>

<div id="conversations" class="section active">

<div id="chatArea"></div>

<div class="messageBox">

<input id="messageInput" placeholder="Message...">

<button onclick="sendMessage()">Envoyer</button>

</div>

</div>

<div id="status" class="section">
<h3>Status</h3>
</div>

<div id="repertoire" class="section">
<h3>Répertoire</h3>
<p>Henoc</p>
</div>

<div id="abonnes" class="section">
<h3>Abonnés</h3>
<p>Henoc</p>
</div>

<script>

function openSection(section){

document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(section).classList.add("active")

}

/* CONFIG FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyAae27A5HSJ80eXk_Zw-khnoDlVUgbZ-MA",

authDomain: "henochat-109b5.firebaseapp.com",

databaseURL: "https://henochat-109b5-default-rtdb.firebaseio.com",

projectId: "henochat-109b5",

storageBucket: "henochat-109b5.firebasestorage.app",

messagingSenderId: "681244730245",

appId: "1:681244730245:web:3042c59fe44fac048f5aec"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* envoyer message */

function sendMessage(){

let input=document.getElementById("messageInput")

let text=input.value

if(text.trim()=="") return

db.ref("messages").push({
message:text
})

input.value=""

}

/* recevoir messages */

db.ref("messages").on("child_added",function(data){

let value=data.val()

if(!value) return

let chat=document.getElementById("chatArea")

let msg=document.createElement("div")

msg.className="chat"

msg.innerText=value.message

chat.appendChild(msg)

})

</script>

</body>

</html>
