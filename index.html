<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Henoc Virtuel Chat</title>
<!-- Firebase JS -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
body { font-family: Arial; background: #ece5dd; margin: 0; padding: 0; }
header { background: #075e54; color: white; padding: 15px; text-align: center; font-size: 1.5em; box-shadow: 0 2px 5px rgba(0,0,0,0.2);}
#title { text-align: center; font-size: 1.8em; margin: 10px 0; color: #075e54; font-weight: bold; }
#chat-container { display: flex; flex-direction: column; height: calc(100vh - 160px); max-width: 600px; margin: 0 auto; padding: 10px; overflow-y: auto; scroll-behavior: smooth; background: #f0f0f0; border-radius: 10px;}
.message { max-width: 70%; margin: 5px 0; padding: 10px 10px 5px 10px; border-radius: 20px; word-wrap: break-word; position: relative; line-height: 1.4; display: flex; align-items: flex-end; }
.user { align-self: flex-end; background-color: #dcf8c6; border-bottom-right-radius: 0; }
.other { align-self: flex-start; background-color: #ffffff; border-bottom-left-radius: 0; }
.avatar { width: 30px; height: 30px; border-radius: 50%; margin-right: 5px; flex-shrink: 0; }
.username { font-weight: bold; display: block; margin-bottom: 2px; }
.timestamp { font-size: 0.7em; color: gray; margin-left: 5px; }
#input-container { display: flex; max-width: 600px; margin: 0 auto; padding: 10px; background: #fff; box-shadow: 0 -2px 5px rgba(0,0,0,0.1);}
#input-container input { padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; margin-right: 5px; }
#input-container button { padding: 10px 20px; border-radius: 20px; border: none; background: #25d366; color: white; cursor: pointer; font-weight: bold; transition: background 0.2s;}
#input-container button:hover { background: #128c7e; }
.new-msg-notification { position: fixed; bottom: 80px; right: 20px; background: #fffa65; padding: 10px 15px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); display: none; cursor: pointer; font-weight: bold;}
@media (max-width: 640px){
  #input-container { flex-direction: column; }
  #input-container input { margin: 5px 0; width: 100%; }
  #input-container button { width: 100%; }
}
</style>
</head>
<body>
<header>Henoc Virtuel Chat</header>
<div id="title">Henoc Virtuel</div>
<div id="chat-container"></div>
<div class="new-msg-notification" id="new-msg">Nouveau message !</div>
<div id="input-container">
<input type="text" id="pseudo" placeholder="Ton pseudo" style="flex:1;">
<input type="text" id="user-input" placeholder="Écris ton message ici..." style="flex:2;">
<button onclick="sendMessage()">Envoyer</button>
</div>

<script>
// 🔹 CONFIGURATION FIREBASE 🔹
const firebaseConfig = {
  apiKey: "AIzaSyAae27A5HSJ80eXk_Zw-khnoDlVUgbZ-MA",
  authDomain: "henochat-109b5.firebaseapp.com",
  databaseURL: "https://henochat-109b5-default-rtdb.firebaseio.com",
  projectId: "henochat-109b5",
  storageBucket: "henochat-109b5.appspot.com",
  messagingSenderId: "681244730245",
  appId: "1:681244730245:web:feb5fe5b02e8f1958f5aec"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const chatRef = db.ref("chat");

// DOM
const chatContainer = document.getElementById('chat-container');
const userInput = document.getElementById('user-input');
const pseudoInput = document.getElementById('pseudo');
const newMsgNotif = document.getElementById('new-msg');
const colors = ["#dcf8c6","#f1f0f0","#ffe4b5","#d1c4e9","#ffccbc","#b2ebf2"];

// Ajouter un message
function addMessage(text, pseudo, timestamp){
    const msg = document.createElement('div');
    msg.className = pseudo === pseudoInput.value.trim() ? 'message user' : 'message other';

    const av = document.createElement('div');
    av.className = 'avatar';
    av.style.backgroundColor = colors[pseudo.charCodeAt(0) % colors.length];
    msg.appendChild(av);

    const content = document.createElement('div');
    const username = document.createElement('span');
    username.className = 'username';
    username.textContent = pseudo;
    username.style.color = colors[pseudo.charCodeAt(0) % colors.length];
    content.appendChild(username);

    const msgText = document.createElement('span');
    msgText.textContent = text;
    content.appendChild(msgText);

    const timeSpan = document.createElement('span');
    timeSpan.className = 'timestamp';
    timeSpan.textContent = timestamp;
    content.appendChild(timeSpan);

    msg.appendChild(content);
    chatContainer.appendChild(msg);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

// Envoyer message à Firebase
function sendMessage(){
    const message = userInput.value.trim();
    const pseudo = pseudoInput.value.trim() || "Anonyme";
    if(!message) return;
    const now = new Date();
    const timestamp = now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');
    chatRef.push({ pseudo, text: message, timestamp });
    userInput.value = '';
}

// Écouter messages en temps réel
chatRef.on("child_added", snapshot => {
    const data = snapshot.val();
    addMessage(data.text, data.pseudo, data.timestamp);

    if(document.hidden){
        newMsgNotif.style.display = 'block';
    }
});

// cacher la notification si l’utilisateur clique dessus
newMsgNotif.addEventListener('click', () => {
    newMsgNotif.style.display = 'none';
    chatContainer.scrollTop = chatContainer.scrollHeight;
});

// Envoyer avec Enter
userInput.addEventListener('keydown', e => { if(e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
