<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Chat</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
body{font-family:Arial;background:#e5ddd5;margin:0;padding:0;}
header{background:#075e54;color:white;text-align:center;padding:15px;font-size:1.5em;}
#chat-list{max-width:600px;margin:0 auto;height:20vh;overflow-y:auto;}
.chat-item{display:flex;align-items:center;padding:10px;border-bottom:1px solid #ccc;cursor:pointer;}
.chat-item:hover{background:#f1f0f0;}
.avatar{width:40px;height:40px;border-radius:50%;margin-right:10px;}
.chat-info{flex:1;}
.chat-name{font-weight:bold;}
.status-text{font-size:0.8em;color:gray;}
.last-message{font-size:0.9em;color:gray;}
#chat-container{max-width:600px;margin:0 auto;height:50vh;overflow-y:auto;padding:10px;display:flex;flex-direction:column;}
.message{padding:10px;border-radius:20px;margin:5px 0;max-width:70%;line-height:1.4;display:flex;flex-direction:column;}
.message.user{align-self:flex-end;background:#dcf8c6;border-bottom-right-radius:0;}
.message.other{align-self:flex-start;background:#ffffff;border-bottom-left-radius:0;}
.ticks{font-size:0.7em;color:gray;align-self:flex-end;}
#input-container{display:flex;max-width:600px;margin:0 auto;padding:10px;}
#input-container input{flex:1;padding:10px;border-radius:20px;border:1px solid #ccc;margin-right:5px;}
#input-container button{padding:10px 20px;border-radius:20px;border:none;background:#25d366;color:white;cursor:pointer;}
</style>
</head>
<body>

<header>Virtual</header>

<!-- Liste des conversations -->
<div id="chat-list"></div>

<!-- Messages privés -->
<div id="chat-container"></div>
<div id="input-container">
<input type="text" id="user-input" placeholder="Écris ton message...">
<button onclick="sendMessage()">Envoyer</button>
</div>

<script>
// 🔹 CONFIGURATION FIREBASE 🔹
const firebaseConfig = {
  apiKey: "AIzaSyAae27A5HSJ80eXk_Zw-khnoDlVUgbZ-MA",
  authDomain: "henochat-109b5.firebaseapp.com",
  databaseURL: "https://henochat-109b5-default-rtdb.firebaseio.com",
  projectId: "henochat-109b5",
  storageBucket: "henochat-109b5.appspot.com",
  messagingSenderId: "681244730245",
  appId: "1:681244730245:web:feb5fe5b02e8f1958f5aec"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔹 VARIABLES 🔹
let currentUserId = "user123"; // changer pour simuler plusieurs utilisateurs
let currentChatId = "chat_user123_user456";
const chatContainer = document.getElementById('chat-container');
const chatList = document.getElementById('chat-list');
const userInput = document.getElementById('user-input');

// 🔹 PRÉSENCE EN LIGNE 🔹
const userStatusRef = db.ref(`users/${currentUserId}/status`);
window.addEventListener("focus", ()=> userStatusRef.set("online"));
window.addEventListener("blur", ()=> userStatusRef.set("offline"));

// 🔹 STATUT UTILISATEUR 🔹
db.ref(`users/${currentUserId}/statusText`).set("Disponible 😎");

// 🔹 CONVERSATIONS EXEMPLE 🔹
const conversations = [
  {id:"chat_user123_user456", name:"Henoc", avatar:"https://i.pravatar.cc/40?img=1"},
  {id:"chat_user123_user789", name:"Virtuel Deux", avatar:"https://i.pravatar.cc/40?img=2"}
];
conversations.forEach(c=>{
  const div=document.createElement('div');
  div.className="chat-item";
  div.onclick=()=>openChat(c.id);
  div.innerHTML=`<img src="${c.avatar}" class="avatar">
  <div class="chat-info">
    <span class="chat-name">${c.name}</span>
    <span class="status-text" id="status-${c.id}"></span>
  </div>`;
  chatList.appendChild(div);
  displayOnlineStatus(c.id, document.getElementById(`status-${c.id}`));
});

// 🔹 AFFICHER PRÉSENCE 🔹
function displayOnlineStatus(userId, element){
  db.ref(`users/${userId}/status`).on("value", snap=>{
    element.textContent = snap.val()==="online"?"En ligne":"Hors ligne";
  });
}

// 🔹 OUVRIR CONVERSATION 🔹
function openChat(chatId){
  currentChatId=chatId;
  chatContainer.innerHTML="";
  const chatRef=db.ref(`privateChats/${chatId}/messages`);
  chatRef.on("child_added", snapshot=>{
    const data=snapshot.val();
    addMessageToUI(snapshot.key,data.senderId,data.text,data.edited,data.readBy);
  });
}

// 🔹 AJOUTER MESSAGE UI 🔹
function addMessageToUI(msgId,sender,text,edited,readBy){
  const msgDiv=document.createElement('div');
  msgDiv.className=sender===currentUserId?"message user":"message other";
  const tickText=sender===currentUserId?`${readBy&&readBy.includes(currentUserId)?"✅ lu":"✅"}`:"";
  msgDiv.innerHTML=`<span>${text}</span>${edited?'<span class="ticks">(modifié)</span>':''}<span class="ticks">${tickText}</span>`;
  chatContainer.appendChild(msgDiv);
  chatContainer.scrollTop=chatContainer.scrollHeight;
  if(sender!==currentUserId) markMessageAsRead(msgId);
}

// 🔹 ENVOYER MESSAGE 🔹
function sendMessage(){
  const text=userInput.value.trim();
  if(!text) return;
  const msgId="msg"+Date.now();
  const now=new Date().toISOString();
  db.ref(`privateChats/${currentChatId}/messages/${msgId}`).set({
    senderId:currentUserId,
    text:text,
    timestamp:now,
    edited:false,
    readBy:[]
  });
  userInput.value='';
}

// 🔹 CONFIRMATION LECTURE 🔹
function markMessageAsRead(msgId){
  const msgRef=db.ref(`privateChats/${currentChatId}/messages/${msgId}/readBy`);
  msgRef.once("value",snap=>{
    let readers=snap.val()||[];
    if(!readers.includes(currentUserId)){
      readers.push(currentUserId);
      msgRef.set(readers);
    }
  });
}
</script>
</body>
  </html>
